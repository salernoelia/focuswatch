name: iOS + watchOS Workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test-ios:
    name: Build & Test iOS
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Create xcconfig files
        run: |
          cat > Development.xcconfig << EOF
          SUPABASE_URL = ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_DRIVE_USERNAME = ${{ secrets.GOOGLE_DRIVE_USERNAME }}
          GOOGLE_DRIVE_PASSWORD = ${{ secrets.GOOGLE_DRIVE_PASSWORD }}
          EOF
          cp Development.xcconfig Production.xcconfig

      - name: Build & Test (iOS)
        run: |
          device=$(xcrun simctl list devices available | grep "iPhone 16" | grep -v "Plus\|Pro\|Max" | head -1 | sed 's/.*(\([A-F0-9-]*\)).*/\1/')
          xcodebuild test \
            -scheme "companion" \
            -project "focuswatch.xcodeproj" \
            -destination "platform=iOS Simulator,id=$device" \
            -testPlan "companion-testing"

  build-and-test-watchos:
    name: Build & Test watchOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Create xcconfig files
        run: |
          cat > Development.xcconfig << EOF
          SUPABASE_URL = ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_DRIVE_USERNAME = ${{ secrets.GOOGLE_DRIVE_USERNAME }}
          GOOGLE_DRIVE_PASSWORD = ${{ secrets.GOOGLE_DRIVE_PASSWORD }}
          EOF
          cp Development.xcconfig Production.xcconfig

      - name: Build & Test (watchOS)
        run: |
          device=$(xcrun simctl list devices available | grep "Apple Watch Series 11 (46mm)" | head -1 | sed 's/.*(\([A-F0-9-]*\)).*/\1/')
          xcodebuild test \
            -scheme "watch" \
            -project "focuswatch.xcodeproj" \
            -destination "platform=watchOS Simulator,id=$device" \
            -testPlan "watch-testing"
